<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A4ANDOX | Admin Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Admin specific layout styles overlaying style.css */
        body { display: flex; flex-direction: column; min-height: 100vh; }
        .admin-header { padding: 1.5rem 5%; border-bottom: 3px solid var(--border-dark); display: flex; justify-content: space-between; align-items: center; background-color: var(--bg-cream); }
        .admin-main { flex: 1; padding: 4rem 5%; display: flex; flex-direction: column; align-items: center; background-image: radial-gradient(#ccc 1px, transparent 1px); background-size: 20px 20px; }
        
        /* Login Box */
        .login-box { background: #fff; border: 3px solid var(--border-dark); box-shadow: 8px 8px 0px 0px var(--border-dark); padding: 3rem; width: 100%; max-width: 400px; text-align: center; }
        .login-box input { width: 100%; padding: 1rem; margin: 1.5rem 0; border: 2px solid var(--border-dark); font-family: var(--font-body); font-size: 1rem; outline: none; }
        .login-box input:focus { box-shadow: 4px 4px 0px 0px var(--accent-orange); }
        .error-msg { color: #E86343; font-size: 0.95rem; font-weight: bold; margin-top: 1rem; display: none; }
        
        /* Dashboard */
        .dashboard { width: 100%; max-width: 900px; display: none; }
        .submissions-grid { display: grid; gap: 1.5rem; margin-top: 2rem; }
        .sub-card { background: #fff; border: 3px solid var(--border-dark); padding: 2rem; box-shadow: 6px 6px 0px 0px var(--border-dark); }
        .sub-header { display: flex; justify-content: space-between; border-bottom: 2px dashed #ccc; padding-bottom: 0.5rem; margin-bottom: 1rem; font-size: 0.9rem; color: #555; }
        .sub-card h4 { font-size: 1.5rem; margin-bottom: 0.5rem; color: var(--accent-orange); font-family: var(--font-heading); }
    </style>
</head>
<body>

    <header class="admin-header">
        <div class="logo">A4ANDOX <span class="text-orange">Admin</span></div>
        <a href="index.html" class="btn-secondary" style="font-size: 0.9rem; font-weight: bold;">← Back to Site</a>
    </header>

    <main class="admin-main">
        <div id="loginView" class="login-box">
            <h2 style="font-family: var(--font-heading); font-size: 2rem;">Access Panel</h2>
            <input type="password" id="adminPassword" placeholder="Enter Password">
            <button id="loginBtn" class="btn-primary" style="width: 100%;">Unlock Dashboard</button>
            <p id="errorMsg" class="error-msg">Incorrect Password.</p>
        </div>

        <div id="dashboardView" class="dashboard">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
                <h2 style="font-family: var(--font-heading); font-size: 2.5rem;">Client Submissions</h2>
                <button id="clearDataBtn" class="btn-secondary" style="color: red; border: 2px solid red; padding: 0.5rem 1rem; background-color: #fff;">Clear All Data</button>
            </div>
            
            <div id="submissionsContainer" class="submissions-grid">
                </div>
        </div>
    </main>

    <script>
        // Admin Panel Logic
        const loginBtn = document.getElementById('loginBtn');
        const passInput = document.getElementById('adminPassword');
        const errorMsg = document.getElementById('errorMsg');
        const loginView = document.getElementById('loginView');
        const dashboardView = document.getElementById('dashboardView');
        const container = document.getElementById('submissionsContainer');
        const clearBtn = document.getElementById('clearDataBtn');

        // Allow pressing "Enter" to login
        passInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') loginBtn.click();
        });

        loginBtn.addEventListener('click', () => {
            if (passInput.value === 'Admin@123') {
                loginView.style.display = 'none';
                dashboardView.style.display = 'block';
                loadSubmissions();
            } else {
                errorMsg.style.display = 'block';
            }
        });

        function loadSubmissions() {
            const data = JSON.parse(localStorage.getItem('a4Submissions')) || [];
            container.innerHTML = ''; // Clear current display

            if (data.length === 0) {
                container.innerHTML = '<p style="text-align: center; font-size: 1.2rem; margin-top: 2rem;">No submissions yet. Test the form on the homepage!</p>';
                return;
            }

            // Loop backwards to show the newest messages first
            for (let i = data.length - 1; i >= 0; i--) {
                const sub = data[i];
                const card = document.createElement('div');
                card.className = 'sub-card';
                card.innerHTML = `
                    <div class="sub-header">
                        <span>Submitted: ${sub.date}</span>
                    </div>
                    <h4>${sub.name}</h4>
                    <p style="margin-bottom: 1rem;"><strong>Email:</strong> <a href="mailto:${sub.email}" class="text-orange" style="font-weight: 600;">${sub.email}</a></p>
                    <div style="padding: 1rem; background: var(--bg-cream); border: 2px solid var(--border-dark); font-family: var(--font-body);">
                        ${sub.message}
                    </div>
                `;
                container.appendChild(card);
            }
        }

        clearBtn.addEventListener('click', () => {
            if(confirm('Are you absolutely sure you want to delete all form submissions? This cannot be undone.')) {
                localStorage.removeItem('a4Submissions');
                loadSubmissions(); // Reload the empty state
            }
        });
    </script>
</body>
</html>
